version: '3.8'

services:
  web-auditor:
    build: .
    container_name: siteverify-app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - /app/venv  # Avoid mounting local venv directory into container
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
